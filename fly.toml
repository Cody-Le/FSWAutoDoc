# fly.toml app configuration file generated for fswautodoc on 2026-05-01T13:43:15Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fswautodoc'
primary_region = 'iad'

[build]

[env]
  DOCS_DIR = '/data/docs'
  MCP_TRANSPORT = 'sse'
  PORT = '8000'

[[mounts]]
  source = 'docs_volume'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
